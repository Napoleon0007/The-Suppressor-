<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Suppressor — by Rex Trueform</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Rex Trueform">
    <h1>THE SUPPRESSOR</h1>
    <p class="tagline">Drop any file. It picks the best route and makes it <span class="hl">far smaller</span> — or converts it to the format you want.</p>
  </header>

  <main>
    <div id="drop" class="dropzone">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="drop-inner">
        <div class="drop-icon">▼</div>
        <p class="drop-title">DRAG FILES HERE</p>
        <p class="drop-sub">images · video · audio · PDF · anything</p>
        <button id="browse" class="btn">SELECT FILES</button>
        <input id="file-input" type="file" multiple hidden>
      </div>
    </div>

    <section id="queue-wrap" class="queue-wrap hidden">
      <div class="queue-head">
        <span>QUEUE</span>
        <span class="dim">pick a mode per file</span>
      </div>
      <div id="queue" class="queue"></div>
      <div class="queue-actions">
        <button id="run" class="btn run">RUN</button>
        <button id="clear" class="btn ghost">CLEAR</button>
      </div>
    </section>

    <div id="status" class="status hidden">
      <span class="spinner"></span>
      <span id="status-text">COMPRESSING…</span>
    </div>

    <section id="results" class="results"></section>
  </main>

  <footer>
    <span class="brand">REX&nbsp;TRUEFORM</span>
    <span class="dim" id="totals"></span>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
